services:
  - type: web
    name: clinic-management-api
    runtime: php
    rootDir: backend
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Clinic Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://clinic-management-api.onrender.com

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: clinic-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: clinic-management-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: clinic-management-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: clinic-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: clinic-management-db
          property: password

      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local

      - key: FRONTEND_URL
        value: https://frontend-tau-teal-59.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: frontend-tau-teal-59.vercel.app
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: SESSION_SECURE_COOKIE
        value: "true"

databases:
  - name: clinic-management-db
    plan: free
    databaseName: clinic_management
    user: clinic_management_user
