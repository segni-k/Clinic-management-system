services:
  - type: web
    name: clinic-management-api
    runtime: php
    rootDir: backend
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force && php artisan db:seed --force && php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Clinic Management System
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://clinic-management-api.onrender.com

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        sync: false
      - key: DB_SSLMODE
        value: require

      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local

      - key: FRONTEND_URL
        value: https://frontend-tau-teal-59.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: frontend-tau-teal-59.vercel.app
      - key: SESSION_COOKIE_SAME_SITE
        value: none
      - key: SESSION_SECURE_COOKIE
        value: "true"
